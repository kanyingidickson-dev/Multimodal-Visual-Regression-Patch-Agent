version: '3.8'

services:
  gemma4-app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - ENVIRONMENT=production
      - HOST=0.0.0.0
      - PORT=5000
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY:-}
      - MODEL_CHOICE=${MODEL_CHOICE:-gemma-4-31b}
      - MOCK_MODE=${MOCK_MODE:-false}
      - API_KEY=${API_KEY:-}
    volumes:
      - ./examples:/app/examples
      - ./prompts:/app/prompts
